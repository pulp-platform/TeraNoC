#
# Trimmed local vendoring of the Spatz vector IP for TeraNoC (upstream
# yzf0470/spatz @ bfa27da, d02afac~1). Only the vector-unit RTL is kept; TeraNoC
# reuses its own deps/snitch and deps/reqrsp_interface. The deps below are
# declared only so Bender propagates their include dirs and unifies their specs
# with the TeraNoC top-level. generated/spatz_pkg.sv is rendered at build time by
# util/render_spatz_pkg.py (see the hardware Makefile); it is gitignored.

package:
  name: spatz

dependencies:
  common_cells:       { git: "https://github.com/pulp-platform/common_cells.git",       version: 1.39.0     }
  tech_cells_generic: { git: "https://github.com/pulp-platform/tech_cells_generic.git",  version: 0.2.13     }
  fpnew:              { git: "https://github.com/pulp-platform/cvfpu.git",                rev: feature/cfmadd }
  snitch:             { path: "hardware/deps/snitch"                                                          }
  reqrsp_interface:   { path: "hardware/deps/reqrsp_interface"                                                }

sources:
  # rvv_pkg/spatz_pkg are referenced by mempool_cc in every build, so they are
  # compiled unconditionally (not under target:spatz) and listed first.
  - files:
    - hw/ip/spatz/src/rvv_pkg.sv
    - hw/ip/spatz/src/generated/spatz_pkg.sv

  - target: spatz
    files:
    # Level 0
    - hw/ip/spatz/src/reorder_buffer.sv
    # Level 1
    - hw/ip/spatz/src/spatz_serdiv.sv
    # Level 2
    - hw/ip/spatz/src/spatz_decoder.sv
    - hw/ip/spatz/src/spatz_simd_lane.sv
    - hw/ip/spatz/src/vregfile.sv
    # Level 3
    - hw/ip/spatz/src/spatz_fpu_sequencer.sv
    - hw/ip/spatz/src/spatz_ipu.sv
    - hw/ip/spatz/src/spatz_vfu.sv
    - hw/ip/spatz/src/spatz_vlsu.sv
    - hw/ip/spatz/src/spatz_vrf.sv
    - hw/ip/spatz/src/spatz_vsldu.sv
    # Level 4
    - hw/ip/spatz/src/spatz_controller.sv
    # Level 5
    - hw/ip/spatz/src/spatz.sv
    # The MemPool core complex (formerly hw/ip/spatz_cc/spatz_mempool_cc.sv) is
    # now inlined into hardware/src/mempool_cc.sv gen_spatz; the file is removed.
